<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background square — ink -->
  <rect width="32" height="32" fill="#0d0d0d"/>

  <!-- Blaze accent bar top -->
  <rect x="0" y="0" width="32" height="4" fill="#ff4d1c"/>

  <!-- Poll bars — neobrutalism style -->
  <!-- Bar 1 (tallest — blaze) -->
  <rect x="4" y="10" width="6" height="18" fill="#ff4d1c"/>

  <!-- Bar 2 (medium — volt) -->
  <rect x="13" y="16" width="6" height="12" fill="#e8ff00"/>

  <!-- Bar 3 (short — paper) -->
  <rect x="22" y="20" width="6" height="8" fill="#f5f0e8"/>

  <!-- Hard shadow dots (neobrutalism detail) -->
  <rect x="4" y="8" width="6" height="2" fill="#ff4d1c" opacity="0.5"/>
</svg>
